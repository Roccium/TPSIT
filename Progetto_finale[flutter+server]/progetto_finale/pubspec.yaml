name: progetto_finale
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.0.5

  # Database locale
  sqflite: ^2.4.2
  path: ^1.9.1

  # Camera
  camera: ^0.12.0+1
  camera_android_camerax: ^0.7.1+2
  # Salvataggio file e percorsi
  path_provider: ^2.1.0

  # Invio immagini via HTTP al server PHP
  http: ^1.2.1

  # Permessi runtime (camera, storage)
  permission_handler: ^11.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true